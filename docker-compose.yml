version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: biobalance_db
    environment:
      POSTGRES_USER: biobalance
      POSTGRES_PASSWORD: biobalance_secret
      POSTGRES_DB: biobalance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biobalance"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
